[pytest]
# Pytest configuration for VyOS Firewall Matcher

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude vyos-1x submodule tests to avoid external dependencies
norecursedirs = .git .tox dist build *.egg vyos-1x

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests with real configs
    slow: Slow running tests
