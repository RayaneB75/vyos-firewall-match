name: CI/CD Pipeline

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  IMAGE_NAME: ${{ github.repository }}
  MIN_PYLINT_SCORE: "9.9"

jobs:
  # Job 1: Linting with pylint (requires score >= 9.9/10)
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run pylint
        run: |
          echo "Running pylint on vyfwmatch/ and tests/ ..."
          python -m pylint vyfwmatch/ tests/ --exit-zero --rcfile=.pylintrc --output-format=json > pylint-report.json 2>&1
          pylint_output=$(python -m pylint vyfwmatch/ tests/ --exit-zero --rcfile=.pylintrc 2>&1)
          echo "$pylint_output"

          # Extract score from output (portable on GNU/BSD toolchains)
          score=$(echo "$pylint_output" | sed -nE 's/.*rated at ([0-9]+(\.[0-9]+)?)\/10.*/\1/p' | head -1)
          min_score=${MIN_PYLINT_SCORE:-9.9}

          if [[ -z "$score" ]]; then
            echo "❌ Unable to parse pylint score from output"
            exit 1
          fi

          echo "Pylint score: $score/10"

          # Check if score meets minimum requirement
          if awk -v score="$score" -v min_score="$min_score" 'BEGIN { exit ((score + 0) < (min_score + 0)) ? 0 : 1 }'; then
            echo "❌ Pylint score $score is below minimum required score of $min_score"
            exit 1
          else
            echo "✅ Pylint score $score meets minimum requirement of $min_score"
          fi

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-results-python-${{ matrix.python-version }}
          path: pylint-report.json
          retention-days: 7

  # Job 2: Testing with pytest (requires 100% pass rate)
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests with pytest
        run: |
          echo "Running pytest with coverage..."
          pytest tests/ -v --cov=vyfwmatch --cov-report=term-missing --cov-report=xml --cov-report=html --junitxml=pytest-results.xml

          # Check if all tests passed (pytest returns 0 on success)
          if [ $? -eq 0 ]; then
            echo "✅ All tests passed (100% pass rate)"
          else
            echo "❌ Some tests failed"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-python-${{ matrix.python-version }}
          path: |
            pytest-results.xml
            htmlcov/
            .coverage
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-python-${{ matrix.python-version }}
          fail_ci_if_error: false

  # Job 3: Build and push Docker image (only for Python 3.14, depends on lint and test)
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Run on:
    # - Push to main/dev branches or tags
    # - Pull requests from repository owner only
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/v'))) ||
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == github.repository_owner)

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive
          persist-credentials: false

      - name: Check build context
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Repository Owner: ${{ github.repository_owner }}"
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "PR Author: ${{ github.event.pull_request.user.login }}"
            echo "PR Number: ${{ github.event.pull_request.number }}"
            if [ "${{ github.event.pull_request.user.login }}" == "${{ github.repository_owner }}" ]; then
              echo "✅ PR from repository owner - will build and push Docker images"
            else
              echo "ℹ️ PR from external contributor - Docker build skipped"
            fi
          else
            echo "✅ Push event - will build and push Docker images"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_DOCKERHUB }}/${{ secrets.DOCKERHUB_USERNAME }}/vyfwmatch
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=VyFwMatch
            org.opencontainers.image.description=VyOS Firewall Policy Matcher
            org.opencontainers.image.vendor=VyFwMatch Contributors

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          # Push to registry for push events; for PRs, only push if from owner
          push: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.user.login == github.repository_owner) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Docker image summary
        run: |
          echo "## Docker Build Summary 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "**Build Type**: Pull Request #${{ github.event.pull_request.number }} from @${{ github.event.pull_request.user.login }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Build Type**: Push to ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Images Published:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Commands:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# GitHub Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vyfwmatch:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # Job 4: Security scanning (runs in parallel with docker build)
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive
          persist-credentials: false

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # Job 5: Automated semantic-release (main branch only)
  release:
    name: Automated Release
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive
          persist-credentials: false

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog@6.0.0
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.SR_GH_TOKEN }}
          GIT_AUTHOR_NAME: "Semantic Release Bot"
          GIT_AUTHOR_EMAIL: "semantic-vyfwmatch@rayane.space"
          GIT_COMMITTER_NAME: ${GIT_AUTHOR_NAME}
          GIT_COMMITTER_EMAIL: ${GIT_AUTHOR_EMAIL}
